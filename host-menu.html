<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진행자 메뉴 - 동물 초성 빙고</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header-icon">
                <div class="icon-wrapper gradient-pink">
                    <span style="font-size: 3rem;">🦊</span>
                </div>
            </div>
            <h2 class="subtitle">진행자 메뉴</h2>
            <p style="text-align: center; color: #cbd5e1; font-size: 0.875rem; margin-bottom: 0.5rem;">
                환영합니다, <span id="userName" style="color: #06b6d4; font-weight: 600;"></span>님!
            </p>
            <p style="text-align: center; color: #94a3b8; font-size: 0.75rem; margin-bottom: 2rem;">
                원하시는 메뉴를 선택하세요
            </p>

            <div class="button-group">
                <button class="btn btn-primary" onclick="location.href='host.html'">
                    <span>🎮</span>
                    <span>게임 진행하기</span>
                </button>

                <button class="btn btn-secondary" onclick="location.href='answers.html'">
                    <span>⚙️</span>
                    <span>정답 관리</span>
                </button>
            </div>

            <!-- 관리자 전용 버튼 -->
            <div id="adminButton" style="display: none;">
                <button class="btn" onclick="location.href='admin-dashboard.html'" style="background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%); color: white;">
                    <span>🔐</span>
                    <span>관리자 대시보드</span>
                </button>
            </div>

            <button class="btn btn-ghost" onclick="logout()">
                <span>🚪</span>
                <span>로그아웃</span>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCuAOnkEmfFEE57D3bgWLU7xR2f0i2psI",
            authDomain: "animal-bingo-90774.firebaseapp.com",
            databaseURL: "https://animal-bingo-90774-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "animal-bingo-90774",
            storageBucket: "animal-bingo-90774.firebasestorage.app",
            messagingSenderId: "547100283990",
            appId: "1:547100283990:web:d1206d278a9f46eaf2d7f7",
            measurementId: "G-E8WLHPJ24E"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 로그인 확인
        const username = sessionStorage.getItem('username');
        const name = sessionStorage.getItem('name');
        const expiryDate = sessionStorage.getItem('expiryDate');
        const userId = sessionStorage.getItem('userId');
        const adminLoggedIn = sessionStorage.getItem('adminLoggedIn');

        // 일반 로그인 또는 관리자 로그인 확인
        if (!username && !adminLoggedIn) {
            alert('로그인이 필요합니다.');
            location.href = 'login.html';
        }

        // 관리자로 로그인한 경우 사용자 정보 표시
        if (adminLoggedIn === 'true' && !username) {
            document.getElementById('userName').textContent = '관리자';
        } else {
            document.getElementById('userName').textContent = name || username;
        }

        // 관리자 권한 확인 (Firebase에서 직접 확인)
        if (userId) {
            database.ref(`users/${userId}`).once('value', (snapshot) => {
                const user = snapshot.val();
                if (user && user.isAdmin === true) {
                    document.getElementById('adminButton').style.display = 'block';
                    sessionStorage.setItem('adminLoggedIn', 'true');
                }
            });
        }

        // 만료일 표시
        if (expiryDate && expiryDate !== 'unlimited') {
            const expiry = new Date(parseInt(expiryDate));
            const now = new Date();
            const daysLeft = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
            
            const expiryInfo = document.createElement('p');
            expiryInfo.style.cssText = 'text-align: center; font-size: 0.75rem; margin-top: 0.5rem;';
            
            if (daysLeft <= 7) {
                expiryInfo.style.color = '#ef4444';
                expiryInfo.innerHTML = `⚠️ 사용 기간이 <strong>${daysLeft}일</strong> 남았습니다<br>만료일: ${expiry.toLocaleDateString('ko-KR')}`;
            } else {
                expiryInfo.style.color = '#94a3b8';
                expiryInfo.innerHTML = `사용 기간 만료일: ${expiry.toLocaleDateString('ko-KR')} (${daysLeft}일 남음)`;
            }
            
            document.querySelector('.card').insertBefore(expiryInfo, document.querySelector('.button-group'));
        } else if (expiryDate === 'unlimited') {
            const unlimitedInfo = document.createElement('p');
            unlimitedInfo.style.cssText = 'text-align: center; color: #10b981; font-size: 0.75rem; margin-top: 0.5rem; margin-bottom: 1rem;';
            unlimitedInfo.innerHTML = '✨ 무제한 사용 계정';
            document.querySelector('.card').insertBefore(unlimitedInfo, document.querySelector('.button-group'));
        }

        // 로그아웃
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                sessionStorage.clear();
                location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
